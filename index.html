<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso NR-13 e NR-01</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

/* Container da landing */
.landing {
    position: relative;
    width: 100%;
    text-align: center;
    color: white;
}

/* Imagem responsiva mostrando inteira */
.landing img {
    width: 100%;
    height: auto;       /* altura ajusta proporcionalmente */
    display: block;
}

/* Caixa do conteúdo central */
.landing-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.4);
    padding: 20px;
    border-radius: 10px;
    max-width: 90%;
}

/* Título e descrição */
.landing-content h1 {
    font-size: 28px;
    margin-bottom: 15px;
}
.landing-content p {
    font-size: 16px;
    margin-bottom: 20px;
}

/* Botão */
.btn-cadastrar {
    padding: 12px 25px;
    font-size: 16px;
    background-color: #ff6600;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
}
.btn-cadastrar:hover {
    background-color: #e65c00;
}

/* Ajustes para celular */
@media screen and (max-width: 480px) {
    .landing-content h1 {
        font-size: 22px;
    }
    .landing-content p {
        font-size: 14px;
    }
    .btn-cadastrar {
        font-size: 14px;
        padding: 10px 20px;
    }
}
</style>
</head>
<body>

<div class="landing">
    <img src="f5.png" alt="Curso NR-13 e NR-01">
    <div class="landing-content">
        <h1>Treinamento NR-13 e NR-01</h1>
        <p>Curso online ao vivo de 40h. Aprenda sobre normas de segurança e regulamentações essenciais para sua atuação profissional.</p>
        <a href="formulario.html"><button class="btn-cadastrar">Fazer Inscrição</button></a>
    </div>
</div>

</body>
</html>
