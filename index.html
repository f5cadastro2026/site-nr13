<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso NR-13 e NR-01</title>
<style>
/* Reset básico */
body, html {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    scroll-behavior: smooth;
}

/* Container da landing com imagem de fundo */
.landing {
    background: url('f5.png') no-repeat center center;
    background-size: cover; /* cobre a tela inteira proporcionalmente */
    min-height: 100vh; /* altura mínima = altura da tela */
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    padding: 20px;
    box-sizing: border-box;
    flex-direction: column;
}

/* Caixa do conteúdo */
.landing-content {
    background: rgba(0,0,0,0.4); /* leve sombra atrás do texto */
    padding: 20px;
    border-radius: 10px;
    max-width: 90%;
    margin-top: 20px; /* espaço abaixo do topo */
}

/* Título e descrição */
.landing-content h1 {
    font-size: 32px;
    margin-bottom: 15px;
}

.landing-content p {
    font-size: 18px;
    margin-bottom: 20px;
}

/* Botão */
.btn-cadastrar {
    padding: 15px 35px;
    font-size: 18px;
    background-color: #ff6600;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
}

.btn-cadastrar:hover {
    background-color: #e65c00;
}

/* Responsividade para tablets e celulares */
@media screen and (max-width: 768px) {
    .landing-content h1 {
        font-size: 26px;
    }
    .landing-content p {
        font-size: 16px;
    }
    .btn-cadastrar {
        font-size: 16px;
        padding: 12px 25px;
    }
}

@media screen and (max-width: 480px) {
    .landing-content h1 {
        font-size: 22px;
    }
    .landing-content p {
        font-size: 14px;
    }
    .btn-cadastrar {
        font-size: 14px;
        padding: 10px 20px;
    }
}
</style>
</head>
<body>

<div class="landing">
    <div class="landing-content">
        <h1>Treinamento NR-13 e NR-01</h1>
        <p>Curso online ao vivo de 40h. Aprenda sobre normas de segurança e regulamentações essenciais para sua atuação profissional.</p>
        <a href="formulario.html"><button class="btn-cadastrar">Fazer Inscrição</button></a>
    </div>
</div>

</body>
</html>

</body>
</html>
