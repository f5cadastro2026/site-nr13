<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso NR-13 e NR-01</title>
<style>
/* Reset básico */
body, html {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    height: 100%;
}

/* Container da landing */
.landing {
    position: relative;
    width: 100%;
    height: 100vh; /* ocupa toda a altura da tela */
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

/* Imagem de fundo responsiva */
.landing img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover; /* ajusta sem deformar */
    top: 0;
    left: 0;
    z-index: -1; /* envia a imagem para trás */
}

/* Conteúdo sobre a imagem */
.landing-content {
    z-index: 1;
    padding: 20px;
    background: rgba(0,0,0,0.4); /* leve sombra atrás do texto para melhor contraste */
    border-radius: 10px;
}

/* Título do curso */
.landing-content h1 {
    font-size: 32px;
    margin-bottom: 15px;
}

/* Descrição do curso */
.landing-content p {
    font-size: 18px;
    margin-bottom: 25px;
}

/* Botão de inscrição */
.btn-cadastrar {
    padding: 15px 35px;
    font-size: 18px;
    background-color: #ff6600;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
}

.btn-cadastrar:hover {
    background-color: #e65c00;
}

/* Responsividade */
@media screen and (max-width: 768px) {
    .landing-content h1 {
        font-size: 26px;
    }
    .landing-content p {
        font-size: 16px;
    }
    .btn-cadastrar {
        font-size: 16px;
        padding: 12px 25px;
    }
}

@media screen and (max-width: 480px) {
    .landing-content h1 {
        font-size: 22px;
    }
    .landing-content p {
        font-size: 14px;
    }
}
</style>
</head>
<body>

<div class="landing">
    <img src="f5.png" alt="Curso NR-13 e NR-01">
    <div class="landing-content">
        <h1>Treinamento NR-13 e NR-01</h1>
        <p>Curso online ao vivo de 40h. Aprenda sobre normas de segurança e regulamentações essenciais para sua atuação profissional.</p>
        <a href="formulario.html"><button class="btn-cadastrar">Fazer Inscrição</button></a>
    </div>
</div>

</body>
</html>
