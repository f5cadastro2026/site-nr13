<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

/* Container da landing */
.landing {
    background: url('f5.png') no-repeat center center/cover; /* Desktop */
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

.btn-cadastrar {
    padding: 15px 30px;
    font-size: 18px;
    background-color: #ff6600;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
}

.btn-cadastrar:hover {
    background-color: #e65c00;
}

/* Troca de imagem para celular */
@media screen and (max-width: 600px) {
    .landing {
        background: url('2.jpg') no-repeat center center/cover; /* Celular */
        padding: 10px;
    }
    .btn-cadastrar {
        font-size: 16px;
        padding: 12px 25px;
    }
}
</style>
</head>
<body>

<div class="landing">
    <a href="formulario.html"><button class="btn-cadastrar">Fazer Inscrição</button></a>
</div>

</body>
</html>
