<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

.landing {
    position: relative;
    text-align: center;
}

.landing img {
    width: 100%;         /* a imagem vai ocupar toda a largura */
    height: auto;        /* altura ajusta proporcionalmente */
    display: block;
}

.btn-cadastrar {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* centraliza o botão */
    padding: 15px 30px;
    font-size: 18px;
    background-color: #ff6600;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
}

.btn-cadastrar:hover {
    background-color: #e65c00;
}

/* Responsividade para celulares */
@media screen and (max-width: 600px) {
    .btn-cadastrar {
        font-size: 16px;
        padding: 12px 25px;
    }
}
</style>
</head>
<body>

<div class="landing">
    <img src="f5.png" alt="Curso">
    <a href="formulario.html"><button class="btn-cadastrar">Fazer Inscrição</button></a>
</div>

</body>
</html>
