<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        .landing {
            background: url('f5.png') no-repeat center center/cover;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-cadastrar {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff6600;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-cadastrar:hover {
            background-color: #e65c00;
        }
    </style>
</head>
<body>
    <div class="landing">
        <button class="btn-cadastrar" onclick="window.location.href='formulario.html'">Cadastre aqui</button>
    </div>
</body>
</html>
